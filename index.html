<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Business Card Generator</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a12;
    color: #fff;
    min-height: 100vh;
  }

  .hero {
    text-align: center;
    padding: 60px 24px 40px;
    background: linear-gradient(135deg, #0c1029, #141940);
  }
  .hero h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }
  .hero h1 span { color: #8b5cf6; }
  .hero p {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    max-width: 500px;
    margin: 0 auto;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }
  @media (max-width: 700px) {
    .container { grid-template-columns: 1fr; }
  }

  .form-section h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: rgba(255,255,255,0.9);
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .field input, .field select {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus {
    border-color: #8b5cf6;
  }
  .field input::placeholder { color: rgba(255,255,255,0.25); }

  .preview-section {
    position: sticky;
    top: 24px;
  }
  .preview-section h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: rgba(255,255,255,0.9);
  }

  .phone-frame {
    width: 280px;
    height: 500px;
    border-radius: 36px;
    border: 3px solid rgba(255,255,255,0.15);
    overflow: hidden;
    margin: 0 auto 20px;
    position: relative;
  }
  #preview-canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s, opacity 0.15s;
    text-decoration: none;
    display: block;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
  .btn-teal { background: linear-gradient(135deg, #14b8a6, #06b6d4); color: #fff; }

  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: #fff; }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 24px 0;
  }

  .footer {
    text-align: center;
    padding: 40px 24px;
    color: rgba(255,255,255,0.3);
    font-size: 14px;
  }
  .footer a { color: #8b5cf6; text-decoration: none; }
</style>
</head>
<body>

<div class="hero">
  <h1>Digital <span>Business Card</span></h1>
  <p>Generate a lock screen QR code, contact card page, and follow-up email template in 60 seconds.</p>
</div>

<div class="container">
  <!-- FORM -->
  <div class="form-section">
    <h2>Your Info</h2>

    <div class="field">
      <label>First Name</label>
      <input type="text" id="firstName" placeholder="Sarah" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>Last Name</label>
      <input type="text" id="lastName" placeholder="Evans" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="title" placeholder="AI Visibility Architect" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>Company</label>
      <input type="text" id="company" placeholder="Zen Media" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@company.com" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>Website / Landing Page URL</label>
      <input type="url" id="website" placeholder="https://yoursite.com" oninput="updatePreview()">
    </div>

    <div class="divider"></div>
    <h2>Links <span style="font-weight:400;font-size:14px;color:rgba(255,255,255,0.4)">(optional)</span></h2>

    <div class="field">
      <label>LinkedIn URL</label>
      <input type="url" id="linkedin" placeholder="https://linkedin.com/in/you" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>GitHub URL</label>
      <input type="url" id="github" placeholder="https://github.com/you" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>Twitter / X URL</label>
      <input type="url" id="twitter" placeholder="https://x.com/you" oninput="updatePreview()">
    </div>

    <div class="divider"></div>
    <h2>Style</h2>

    <div class="field">
      <label>Accent Color</label>
      <div class="color-row" id="colorPicker">
        <div class="color-swatch active" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)" data-color="#8b5cf6" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:linear-gradient(135deg,#14b8a6,#06b6d4)" data-color="#14b8a6" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:linear-gradient(135deg,#ec4899,#f43f5e)" data-color="#ec4899" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:linear-gradient(135deg,#f59e0b,#f97316)" data-color="#f59e0b" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:linear-gradient(135deg,#22c55e,#16a34a)" data-color="#22c55e" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#ffffff" data-color="#ffffff" onclick="pickColor(this)"></div>
      </div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-section">
    <h2>Preview</h2>
    <div class="phone-frame">
      <canvas id="preview-canvas" width="1080" height="1920"></canvas>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="downloadImage()">📱 Download Lock Screen Image</button>
      <button class="btn btn-teal" onclick="downloadVCard()">💾 Download Contact Card (.vcf)</button>
      <button class="btn btn-secondary" onclick="downloadAll()">📦 Download Everything (.zip)</button>
    </div>
  </div>
</div>

<div class="footer">
  Built by <a href="https://asksarah.ai">Sarah Evans</a> — AI Visibility Architect
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
let accentColor = '#8b5cf6';

function pickColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  accentColor = el.dataset.color;
  updatePreview();
}

function val(id) { return document.getElementById(id).value.trim(); }

function updatePreview() {
  const canvas = document.getElementById('preview-canvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1920;
  const cx = W / 2;

  // Background
  ctx.fillStyle = '#0c1029';
  ctx.fillRect(0, 0, W, H);

  // Glow
  const g = ctx.createRadialGradient(cx, H*0.4, 0, cx, H*0.4, 500);
  g.addColorStop(0, accentColor + '1a');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const first = val('firstName') || 'YOUR';
  const last = val('lastName') || 'NAME';
  const titleText = val('title') || 'Your Title';
  const url = val('website') || 'yoursite.com';
  const displayUrl = url.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '');

  // Name
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 160px Arial, Helvetica, sans-serif';
  ctx.fillText(first.toUpperCase(), cx, 200);
  ctx.fillText(last.toUpperCase(), cx, 380);

  // Title
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = 'bold 52px Arial, Helvetica, sans-serif';
  ctx.fillText(titleText, cx, 520);

  // QR
  const qrSize = 500, qrPad = 50;
  const box = qrSize + qrPad * 2;
  const qrTop = 620, qrLeft = (W - box) / 2;

  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.roundRect(qrLeft, qrTop, box, box, 30);
  ctx.fill();

  const qrUrl = url.startsWith('http') ? url : ('https://' + url);
  const qrCanvas = document.createElement('canvas');
  QRCode.toCanvas(qrCanvas, qrUrl || 'https://example.com', {
    width: qrSize, margin: 2,
    color: { dark: '#000000', light: '#ffffff' },
    errorCorrectionLevel: 'H'
  }, () => {
    ctx.drawImage(qrCanvas, qrLeft + qrPad, qrTop + qrPad, qrSize, qrSize);
  });

  // URL
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 64px Arial, Helvetica, sans-serif';
  ctx.fillText(displayUrl, cx, qrTop + box + 80);

  // Scan text
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '36px Arial, Helvetica, sans-serif';
  ctx.fillText('Scan to connect', cx, qrTop + box + 150);
}

function downloadImage() {
  const canvas = document.getElementById('preview-canvas');
  const link = document.createElement('a');
  link.download = 'lockscreen.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function generateVCard() {
  return `BEGIN:VCARD
VERSION:3.0
N:${val('lastName')};${val('firstName')};;;
FN:${val('firstName')} ${val('lastName')}
ORG:${val('company')}
TITLE:${val('title')}
EMAIL;TYPE=WORK:${val('email')}
URL;TYPE=WORK:${val('website')}
${val('linkedin') ? 'X-SOCIALPROFILE;TYPE=linkedin:' + val('linkedin') : ''}
NOTE:${val('title')} at ${val('company')}
END:VCARD`;
}

function downloadVCard() {
  const blob = new Blob([generateVCard()], { type: 'text/vcard' });
  const link = document.createElement('a');
  link.download = `${val('firstName').toLowerCase() || 'contact'}-${val('lastName').toLowerCase() || 'card'}.vcf`;
  link.href = URL.createObjectURL(blob);
  link.click();
}

function generateCardHTML() {
  const first = val('firstName'), last = val('lastName');
  const initials = (first[0]||'') + (last[0]||'');
  return `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${first} ${last} — Contact</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{max-width:440px;width:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:24px;padding:48px 36px;position:relative;overflow:hidden}.avatar{width:88px;height:88px;border-radius:50%;background:${accentColor};display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;margin-bottom:24px}h1{font-size:32px;font-weight:700;margin-bottom:6px}.role{font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:4px}.company{font-size:14px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:32px}.divider{height:1px;background:rgba(255,255,255,0.1);margin:24px 0}.contact-row{display:flex;align-items:center;gap:14px;padding:12px 0;text-decoration:none;color:#fff}.contact-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:18px}.contact-label{font-size:12px;color:rgba(255,255,255,0.4)}.contact-value{font-size:15px;font-weight:500}.actions{display:flex;gap:12px;margin-top:32px}.btn{flex:1;padding:14px;border-radius:14px;text-align:center;font-size:15px;font-weight:600;text-decoration:none;color:#fff}.btn-primary{background:${accentColor}}.btn-secondary{background:rgba(255,255,255,0.1)}</style></head>
<body><div class="card">
<div class="avatar">${initials}</div>
<h1>${first} ${last}</h1>
<div class="role">${val('title')}</div>
<div class="company">${val('company')}</div>
<div class="divider"></div>
${val('email') ? `<a href="mailto:${val('email')}" class="contact-row"><div class="contact-icon">✉️</div><div><div class="contact-label">Email</div><div class="contact-value">${val('email')}</div></div></a>` : ''}
${val('website') ? `<a href="${val('website')}" class="contact-row" target="_blank"><div class="contact-icon">🌐</div><div><div class="contact-label">Website</div><div class="contact-value">${val('website').replace(/^https?:\\/\\/(www\\.)?/,'')}</div></div></a>` : ''}
${val('linkedin') ? `<a href="${val('linkedin')}" class="contact-row" target="_blank"><div class="contact-icon">💼</div><div><div class="contact-label">LinkedIn</div><div class="contact-value">LinkedIn Profile</div></div></a>` : ''}
<div class="actions">
<a href="mailto:${val('email')}?subject=Great%20meeting%20you!" class="btn btn-primary">Send Email</a>
<a href="${val('firstName').toLowerCase()}-${val('lastName').toLowerCase()}.vcf" class="btn btn-secondary">Save Contact</a>
</div></div></body></html>`;
}

async function downloadAll() {
  const zip = new JSZip();
  
  // Lock screen image
  const canvas = document.getElementById('preview-canvas');
  const imgData = canvas.toDataURL('image/png').split(',')[1];
  zip.file('lockscreen.png', imgData, {base64: true});
  
  // vCard
  zip.file(`${val('firstName').toLowerCase()}-${val('lastName').toLowerCase()}.vcf`, generateVCard());
  
  // Contact card HTML
  zip.file('card.html', generateCardHTML());
  
  // README
  zip.file('README.md', `# Digital Business Card — ${val('firstName')} ${val('lastName')}\n\n## Files\n- \`lockscreen.png\` — Set as your phone lock screen wallpaper\n- \`card.html\` — Deploy to any web host as your contact card page\n- \`${val('firstName').toLowerCase()}-${val('lastName').toLowerCase()}.vcf\` — vCard file for "Save Contact"\n\n## Setup\n1. Set lockscreen.png as your phone wallpaper\n2. Deploy card.html to your website (Vercel, Netlify, GitHub Pages)\n3. When someone scans your QR code, they land on your contact card\n\nGenerated with [Digital Business Card Generator](https://github.com/sarahevansai/digital-business-card)`);
  
  const blob = await zip.generateAsync({type: 'blob'});
  const link = document.createElement('a');
  link.download = `${val('firstName').toLowerCase()}-${val('lastName').toLowerCase()}-business-card.zip`;
  link.href = URL.createObjectURL(blob);
  link.click();
}

// Initial render
updatePreview();
</script>

</body>
</html>
